<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        let cars = ["HONDA", "BMW", "TOYOTA"]

        const addCar = newCar => {
            cars.push(newCar)
        }

        const displayCars = () => {
            document.write("<br>Cars: ", cars)
        }

        // displayCars()
        // addCar("MERCEDES")
        // displayCars()
        // addCar("FORD")
        // displayCars()

        const addCar_async = (newCar) => {
            setTimeout(() => {
                cars.push(newCar)
            }, 2000);
        }
        const display_async = () => {
            setTimeout(() => {
                document.write("<br>Cars: ", cars)
            }, 3000);
        }

        // display_async()
        // addCar_async("MERCEDES")
        // display_async()
        // addCar_async("FORD")
        // display_async()

        //1.callback - pass the second function to first function
        const addCar_cb = (newCar) => {
            setTimeout(() => {
                cars.push(newCar)
            }, 2000);
        }

        //2.promise - .then .catch
        const addCar_promise = (newCar) => {
            return new Promise((resolve, reject) => {
                let error = false
                if (error) {
                    reject()
                }
                else {
                    cars.push(newCar)
                    resolve()
                }
            })
        }

        addCar_promise("Suzuki")
        .then(() => {
            display_async()
        })

        .catch(() => {
            document.write("<br>Something went wrong")
        })
        
        //3.promise - async await 
        

    </script>

</body>
  
</html>
