<html lang = "en">
    <head>
        <title>Arrow Function</title>   
    </head>
    <body>
        <script>
            const add = (m, n) => {
                return m + n;
            };

            const sub = () => {
                let a = prompt("Enter a number");
                let b = prompt("Enter another number");
                return a - b;
            };

        let ans = add(5, 10);
        document.write("The sum is: " + ans);
        ans = sub();
        document.write("The difference is: " + ans);
        </script>
    </body>
</html>
